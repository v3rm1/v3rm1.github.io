<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>v3rm1 — Varun Ravi Varma</title>
  <meta name="description" content="AI Research Scientist & Software Engineer — Terminal Portfolio">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <div class="terminal-window">
    <div class="title-bar">
      <div class="title-buttons">
        <span class="btn-close"></span>
        <span class="btn-minimize"></span>
        <span class="btn-maximize"></span>
      </div>
      <div class="title-text">v3rm1@portfolio:~</div>
    </div>
    <div class="terminal-body" id="terminal-body">
      <div id="output"></div>
      <div class="input-line" id="input-line">
        <span class="prompt">v3rm1@portfolio:~$&nbsp;</span>
        <input type="text" id="command-input" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>
  <div class="command-bar" id="command-bar">
    <button class="cmd-pill" data-cmd="help">help</button>
    <button class="cmd-pill" data-cmd="about">about</button>
    <button class="cmd-pill" data-cmd="projects">projects</button>
    <button class="cmd-pill" data-cmd="cv">cv</button>
    <button class="cmd-pill" data-cmd="skills">skills</button>
    <button class="cmd-pill" data-cmd="publications">publications</button>
    <button class="cmd-pill" data-cmd="contact">contact</button>
    <button class="cmd-pill" data-cmd="clear">clear</button>
  </div>
  <script src="js/data.js"></script>
  <script src="js/terminal.js"></script>
</body>
</html>
